<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Show Me Scales</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="orientation-warning" data-i18n="orientationWarning"></div>

    <!-- Bouton flottant pour restaurer l'UI quand Zen Mode est actif -->
    <button class="floating-restore" id="btn-restore-ui" data-i18n-title="zenModeRestore" title="Afficher l'interface">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
        </svg>
    </button>

    <div id="app">
        <!-- En-tête -->
        <header id="top-bar">
            <div class="header-section">
                <!-- Dropdown Modes -->
                <div class="dropdown">
                    <button class="icon-btn" id="btn-app-mode" data-i18n-title="modeExplore" title="Mode de recherche">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                    <div class="dropdown-content">
                        <a onclick="setAppMode('explore')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <span data-i18n="modeExplore">Mode Exploration</span>
                        </a>
                        <a onclick="setAppMode('search_notes')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 18V5l12-2v13"></path>
                                <circle cx="6" cy="18" r="3"></circle>
                                <circle cx="18" cy="16" r="3"></circle>
                            </svg>
                            <span data-i18n="modeSearchNotes">Recherche par Notes</span>
                        </a>
                        <a onclick="setAppMode('search_intervals')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="4" y1="9" x2="20" y2="9"></line>
                                <line x1="4" y1="15" x2="20" y2="15"></line>
                                <line x1="10" y1="3" x2="8" y2="21"></line>
                                <line x1="16" y1="3" x2="14" y2="21"></line>
                            </svg>
                            <span data-i18n="modeSearchIntervals">Recherche par Intervalles</span>
                        </a>
                    </div>
                </div>
                <!-- Toggle Affichage (Notes / Intervalles) -->
                <button class="icon-btn" id="btn-display-mode" data-i18n-title="displayNotes" title="Affichage : Notes / Intervalles">
                    <svg id="icon-notes" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                    <svg id="icon-intervals" style="display:none;" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="4" y1="9" x2="20" y2="9"></line>
                        <line x1="4" y1="15" x2="20" y2="15"></line>
                        <line x1="10" y1="3" x2="8" y2="21"></line>
                        <line x1="16" y1="3" x2="14" y2="21"></line>
                    </svg>
                </button>
            </div>

            <div class="header-center">
                <div id="scale-name-container">
                    <h1 id="scale-name">...</h1><button class="icon-btn" id="btn-play-audio"><svg width="24" height="24"
                            viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z" />
                        </svg></button>
                </div>
                <div id="formula-bar"></div>
            </div>

            <div class="header-section header-right">
                <div style="display:flex; gap: 4px;">
                    <button class="icon-btn" id="btn-hide-ui" data-i18n-title="hideUI" title="Cacher l'interface (Zen Mode)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                    <button class="icon-btn" id="btn-split" data-i18n-title="splitView" title="Séparer la vue (2 instruments)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                        </svg>
                    </button>
                    <button class="icon-btn" id="btn-toggle-dict" data-i18n-title="toggleDict" title="Afficher/Masquer le dictionnaire">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="15" y1="3" x2="15" y2="21"></line>
                        </svg>
                    </button>
                    <button class="icon-btn" id="btn-fullscreen" data-i18n-title="fullscreen" title="Plein écran">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                        </svg>
                    </button>
                    <button class="icon-btn" id="btn-lang" title="Language">
                        <span style="font-weight:bold;font-size:0.8rem;">EN</span>
                    </button>
                </div>
                <div style="display:flex; align-items:center; margin-left: 15px; gap: 5px;">
                    <span style="font-size: 0.9rem; color: #aaa;" data-i18n="key">Tonalité:</span>
                    <button id="btn-key">C</button>
                </div>
            </div>
        </header>
        <div id="app-version">v1.0.0</div>

        <div id="main-content">
            <!-- Zone Instruments (Multiples possibles) -->
            <div id="instruments-wrapper">
                <!-- Inst 0 -->
                <main class="instrument-container" id="inst-container-0">
                    <button class="btn-tuning-presets" onclick="openTuningPresetsPicker(0)"
                        title="Instrument & Accordages">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                    <div class="instrument-label" id="inst-label-0"></div>
                    <canvas id="canvas-0"></canvas>
                    <div class="tuning-pegs" id="pegs-0"></div>
                    <div class="zoom-controls">
                        <button onclick="zoomIn(0)">+</button>
                        <button onclick="zoomOut(0)">-</button>
                    </div>
                </main>
                <!-- Inst 1 (Split) -->
                <main class="instrument-container" id="inst-container-1" style="display:none;">
                    <button class="btn-tuning-presets" onclick="openTuningPresetsPicker(1)"
                        title="Instrument & Accordages">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                    <div class="instrument-label" id="inst-label-1"></div>
                    <canvas id="canvas-1"></canvas>
                    <div class="tuning-pegs" id="pegs-1"></div>
                    <div class="zoom-controls">
                        <button onclick="zoomIn(1)">+</button>
                        <button onclick="zoomOut(1)">-</button>
                    </div>
                </main>
            </div>

            <!-- Dictionnaire (Onglets & Grille) -->
            <footer id="dictionary-zone">
                <div class="tabs">
                    <div class="tab active" id="tab-scales" onclick="setDictTab('scales')" data-i18n="tabScales">GAMMES</div>
                    <div class="tab" id="tab-chords" onclick="setDictTab('chords')" data-i18n="tabChords">ACCORDS</div>
                </div>
                <div class="grid-header">
                    <strong id="dict-title" data-i18n="dictionary">Dictionnaire</strong>
                    <div style="display:flex; gap: 5px;">
                        <button id="btn-filter-common" class="active-toggle" style="padding: 4px 8px;" data-i18n="commonFilter">Common</button>
                    </div>
                </div>

                <div id="dictionary-grid"></div>

                <div id="chord-builder">
                    <div class="cb-roots" id="cb-roots"></div>
                    <div class="cb-qualities" id="cb-qualities"></div>
                </div>
            </footer>
        </div>

        <!-- Modal Choix de Tonalité (Général / Corde) -->
        <div id="key-picker-modal">
            <div class="modal-content">
                <h3 id="key-picker-title" data-i18n="selectKey">Sélectionner la Tonalité</h3>
                <div class="key-picker-grid" id="key-picker-grid"></div>
                <button id="btn-any-key" class="key-btn" data-i18n="allAny">Toutes (Any)</button>
                <button onclick="closeKeyPicker()"
                    style="margin-top:10px; width:100%; background: #555;" data-i18n="cancel">Annuler</button>
            </div>
        </div>

        <!-- Modal Choix de Tonalité Spécifique -->
        <div id="scale-root-picker-modal">
            <div class="modal-content">
                <h3 id="scale-root-picker-title" data-i18n="selectKey">Sélectionner la Tonalité</h3>
                <div class="key-picker-grid" id="scale-root-picker-grid"></div>
                <button onclick="document.getElementById('scale-root-picker-modal').style.display='none'"
                    style="margin-top:15px; width:100%; background: #555;" data-i18n="cancel">Annuler</button>
            </div>
        </div>

        <!-- Modal Accordages Prédéfinis -->
        <div id="tuning-presets-modal">
            <div class="modal-content">
                <div class="instrument-selector">
                    <button class="instrument-btn active" id="btn-inst-guitar"
                        onclick="setInstrumentType('guitar')" data-i18n="guitar">Guitare</button>
                    <button class="instrument-btn" id="btn-inst-bass" onclick="setInstrumentType('bass')" data-i18n="bass">Basse</button>
                    <button class="instrument-btn" id="btn-inst-ukulele"
                        onclick="setInstrumentType('ukulele')" data-i18n="ukulele">Ukulélé</button>
                    <button class="instrument-btn" id="btn-inst-piano"
                        onclick="setInstrumentType('piano')" data-i18n="piano">Piano</button>
                    <button class="instrument-btn" id="btn-inst-score"
                        onclick="setInstrumentType('score')" data-i18n="score">Partition</button>
                </div>
                <h3 id="tuning-title" data-i18n="tuningPresets">Accordages</h3>
                <div id="tuning-presets-list" style="margin-top: 15px;">
                    <!-- Rempli par JS -->
                </div>
                <button onclick="document.getElementById('tuning-presets-modal').style.display='none'"
                    style="margin-top:15px; width:100%; background: #555;" data-i18n="close">Fermer</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
